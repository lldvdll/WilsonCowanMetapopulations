---
model_params:
  mode: "wilson_cowan"
  
  # The "Frankenstein" weights that actually work
  c_ee: 1  
  c_ei: -1   # Flipped!
  c_ie: 1    # Flipped!
  c_ii: -1  
  
  # Delays (dynamically overwritten by the script)
  tau_1: 1.0  
  tau_2: 1.0  
  rho: 10  
  
  beta: 10   
  alpha: 0.6  
  
  # Positive stimuli as printed
  P: 0.5  
  Q: 0.5  
  k: 1         

network_params:
  topology: ring    
  normalise: True   # Kept ON!
  self_delay: 0.25 
  node_distance: 1  
  signal_velocity: 2 
  N: 16        
  p: None 

simulation:
  duration: 80      # Keep it at 80 for the fast test
  dt: 0.1
  initial_conditions:
    E: 0.25
    I: 0.75