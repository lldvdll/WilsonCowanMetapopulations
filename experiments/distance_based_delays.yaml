---
# ============================================================================
# Distance-Based Delays Experiment Configuration
# ============================================================================
# 
# This config extends the basic Wilson-Cowan model with DISTANCE-BASED delays
# between nodes. Instead of using a constant inter-node delay (rho), delays 
# are computed from spatial distances between nodes.
#
# Key Formula:
#   delay[i,j] = base_delay + (distance[i,j] / signal_velocity)
#
# HOW TO ADJUST DELAYS:
#   - Increase 'signal_velocity' → SHORTER delays (faster signal)
#   - Decrease 'signal_velocity' → LONGER delays (slower signal)  
#   - Increase 'base_delay' → ADD constant delay to all connections
#   - Set 'max_delay' → CAP maximum delay (for efficiency)
# ============================================================================

model_params:
  # ----------------------------------------------------------------------
  # Standard Wilson-Cowan Parameters (same as paper)
  # ----------------------------------------------------------------------
  mode: "wilson_cowan"
  
  # Synaptic weights (connection strengths)
  c_ee: 1.0    # Excitatory to Excitatory
  c_ei: 1.0    # Excitatory to Inhibitory  
  c_ie: -1.0   # Inhibitory to Excitatory (negative = inhibition)
  c_ii: -1.0   # Inhibitory to Inhibitory
  
  # Intra-node delays (within each population)
  # These remain CONSTANT (not distance-based) as in the paper
  tau_1: 1.0   # Same-type delay (E→E, I→I)
  tau_2: 1.4   # Cross-type delay (E→I, I→E)
  
  # Inter-node delay (ρ in paper) - OVERRIDDEN by distance-based delays
  # This value is used as a fallback if distance delays are disabled
  rho: 10.0
  
  # Sigmoid response function
  beta: 10.0   # Steepness of sigmoid. Higher = sharper transition
  
  # Timescales
  alpha: 0.6   # Relative timescale between E and I populations
  T_e: 1.0     # Excitatory population timescale
  T_i: 1.0     # Inhibitory population timescale
  
  # External inputs (drive the system)
  P: 0.5       # External input to Excitatory populations
  Q: 0.5       # External input to Inhibitory populations
  
  # Inter-node coupling strength
  k: 1.0       # Try k=1 (weak) vs k=10 (strong) coupling


network_params:
  # ----------------------------------------------------------------------
  # Network Topology
  # ----------------------------------------------------------------------
  # Options: 'line', 'ring', 'lattice', 'full', 'smallworld'
  # 
  # Each topology has different spatial properties:
  #   - line: 1D chain, max distance scales with N
  #   - ring: Circular, max distance ~ N/π  
  #   - lattice: 2D grid, max distance ~ sqrt(2*N)
  #   - full: All-to-all, uses spring layout (random-ish positions)
  #   - smallworld: Mix of local and long-range, spring layout
  # ----------------------------------------------------------------------
  topology: ring
  
  N: 16  # Number of nodes (populations)
  
  # Ring/SmallWorld specific parameters
  p: 0.2           # Proportion of neighbors to connect (ring)
  rewire_prob: 0.05  # Rewiring probability (smallworld only)


distance_delay_params:
  # ----------------------------------------------------------------------
  # Distance-Based Delay Configuration
  # ----------------------------------------------------------------------
  # This section controls how inter-node delays are calculated from
  # spatial distances between nodes.
  # ----------------------------------------------------------------------
  
  # Enable/disable distance-based delays
  # If False, uses constant 'rho' from model_params instead
  enabled: true
  
  # *** PRIMARY PARAMETER TO ADJUST DELAY MAGNITUDE ***
  # Signal propagation velocity between nodes
  # Units: [spatial units / time units]
  # 
  # Examples:
  #   - signal_velocity = 1.0  → delay = distance (1:1 mapping)
  #   - signal_velocity = 2.0  → delay = distance/2 (faster, shorter delays)
  #   - signal_velocity = 0.5  → delay = distance*2 (slower, longer delays)
  # 
  # For neural systems: Typical axonal conduction velocity is 1-10 m/s
  # Adjust based on your spatial scale!
  signal_velocity: 2.0
  
  # Baseline delay added to ALL connections (synaptic/processing delay)
  # Units: [time units]
  # This represents the minimum delay regardless of distance
  base_delay: 0.5
  
  # Self-connection delay (delay from node to itself)
  # Usually 0 or very small
  self_delay: 0.0
  
  # Maximum allowed delay (caps very large delays for efficiency)
  # Set to null or remove to disable capping
  # Units: [time units]
  # 
  # Why cap delays?
  #   - Very large delays increase computation time
  #   - DDE solver must store longer history
  #   - Biologically, very distant connections might not exist
  # 
  # Example: max_delay = 50 ensures no delay exceeds 50 time units
  max_delay: 50.0
  
  # Spatial scaling factor
  # Multiplies all node coordinates, effectively scaling all distances
  # 
  # Examples:
  #   - scale = 1.0 → standard spacing
  #   - scale = 2.0 → nodes 2x further apart → 2x larger distances → 2x longer delays
  #   - scale = 0.5 → nodes 2x closer → 0.5x distances → 0.5x shorter delays
  # 
  # Combined effect with velocity:
  #   delay = base_delay + (distance * scale) / signal_velocity
  scale: 1.0
  
  # Random seed for layouts (full/smallworld topologies)
  # Change this to get different spatial arrangements
  layout_seed: 42


simulation:
  # ----------------------------------------------------------------------
  # Simulation Parameters
  # ----------------------------------------------------------------------
  duration: 1000   # Total simulation time [time units]
  dt: 0.1         # Integration timestep [time units]
  
  # Initial conditions for [E_0, ..., E_N, I_0, ..., I_N]
  # Options:
  #   - Single float: same value for all populations
  #   - Dict with 'E' and 'I' keys: different values for E and I
  # 
  # Examples:
  #   initial_conditions: 0.5          # All populations start at 0.5
  #   initial_conditions:              # E starts at 0.6, I at 0.4
  #     E: 0.6
  #     I: 0.4
  initial_conditions: 0.5


# ============================================================================
# EXPERIMENT PARAMETER SWEEPS (Optional)
# ============================================================================
# Uncomment and modify these sections to run parameter sweeps
# ============================================================================

# parameter_sweep:
#   # Example 1: Vary signal velocity to see effect on synchronization
#   signal_velocity: [0.5, 1.0, 2.0, 5.0, 10.0]
#   
#   # Example 2: Vary coupling strength
#   k: [1, 5, 10]
#   
#   # Example 3: Vary network topology
#   topology: ['line', 'ring', 'lattice', 'full']
#   
#   # Example 4: Vary network size
#   N: [10, 16, 25, 50, 100]


# ============================================================================
# NOTES ON PARAMETER RELATIONSHIPS
# ============================================================================
#
# Delay magnitude is controlled by THREE parameters working together:
#
#   delay[i,j] = base_delay + (distance[i,j] * scale) / signal_velocity
#
# To INCREASE delays (slower communication):
#   Option 1: DECREASE signal_velocity (e.g., 2.0 → 0.5)
#   Option 2: INCREASE scale (e.g., 1.0 → 2.0)
#   Option 3: INCREASE base_delay (e.g., 0.5 → 2.0)
#
# To DECREASE delays (faster communication):
#   Option 1: INCREASE signal_velocity (e.g., 2.0 → 10.0)
#   Option 2: DECREASE scale (e.g., 1.0 → 0.5)
#   Option 3: DECREASE base_delay (e.g., 0.5 → 0.0)
#
# Max delay vs Network size:
#   - Larger networks (higher N) → potentially larger max distances
#   - May need to adjust max_delay accordingly
#   - Or use sparser topologies (line, ring) instead of full connectivity
#
# Topology effects on delays:
#   - 'line': Linear increase in max distance with N
#   - 'ring': Circular, bounded max distance ~N/π
#   - 'lattice': 2D, max distance ~sqrt(2*N)
#   - 'full'/'smallworld': Random layout, variable distances
#
# ============================================================================
